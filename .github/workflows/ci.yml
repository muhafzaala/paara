name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ matrix.node }}" }
      - name: Server install
        working-directory: paara/server
        run: npm ci
      - name: Server lint (no-op if not set)
        working-directory: paara/server
        run: npm run lint || true
      - name: Client install
        working-directory: paara/client
        run: npm ci
      - name: Client build
        working-directory: paara/client
        run: npm run build
